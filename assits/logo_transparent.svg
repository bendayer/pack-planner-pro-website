<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420" width="360" height="420">
  <title>Pack Planner Pro</title>
  <defs>

    <!-- Clip paths — each shape clips its own chips -->
    <clipPath id="c-t1">
      <ellipse cx="62"  cy="148" rx="46" ry="64" transform="rotate(-18 62 148)"/>
    </clipPath>
    <clipPath id="c-t2">
      <ellipse cx="148" cy="112" rx="50" ry="76"/>
    </clipPath>
    <clipPath id="c-t3">
      <ellipse cx="212" cy="112" rx="50" ry="76"/>
    </clipPath>
    <clipPath id="c-t4">
      <ellipse cx="298" cy="148" rx="46" ry="64" transform="rotate(18 298 148)"/>
    </clipPath>
    <clipPath id="c-heel">
      <ellipse cx="180" cy="310" rx="162" ry="132"/>
    </clipPath>

  </defs>

  <!-- ═══════════════════════
       HEEL PAD
  ═══════════════════════ -->
  <ellipse cx="180" cy="310" rx="162" ry="132" fill="#0033A0"/>

  <!-- Heel: subtle header zone -->
  <g clip-path="url(#c-heel)">
    <rect x="30" y="202" width="300" height="22" rx="7" fill="#00216E" opacity="0.55"/>

    <!-- Three window dots -->
    <circle cx="52"  cy="213" r="4.5" fill="white" opacity="0.22"/>
    <circle cx="68"  cy="213" r="4.5" fill="white" opacity="0.22"/>
    <circle cx="84"  cy="213" r="4.5" fill="white" opacity="0.22"/>

    <!-- Week label pill -->
    <rect x="126" y="206" width="108" height="13" rx="6.5" fill="white" opacity="0.09"/>

    <!-- Row 1 -->
    <rect x="30"  y="232" width="50" height="22" rx="7" fill="#2F9E6A" opacity="0.90"/>
    <rect x="90"  y="232" width="50" height="22" rx="7" fill="white"   opacity="0.13"/>
    <rect x="150" y="232" width="50" height="22" rx="7" fill="white"   opacity="0.82"/>
    <rect x="210" y="232" width="50" height="22" rx="7" fill="white"   opacity="0.13"/>
    <rect x="270" y="232" width="50" height="22" rx="7" fill="#2F9E6A" opacity="0.90"/>
    <!-- Row 1 text hints -->
    <rect x="39"  y="239" width="30" height="7" rx="3.5" fill="white"   opacity="0.65"/>
    <rect x="159" y="239" width="30" height="7" rx="3.5" fill="#001F6B" opacity="0.28"/>
    <rect x="279" y="239" width="30" height="7" rx="3.5" fill="white"   opacity="0.65"/>

    <!-- Row 2 -->
    <rect x="30"  y="263" width="50" height="22" rx="7" fill="white"   opacity="0.13"/>
    <rect x="90"  y="263" width="50" height="22" rx="7" fill="white"   opacity="0.82"/>
    <rect x="150" y="263" width="50" height="22" rx="7" fill="white"   opacity="0.13"/>
    <rect x="210" y="263" width="50" height="22" rx="7" fill="#2F9E6A" opacity="0.90"/>
    <rect x="270" y="263" width="50" height="22" rx="7" fill="white"   opacity="0.13"/>
    <rect x="99"  y="270" width="30" height="7" rx="3.5" fill="#001F6B" opacity="0.28"/>
    <rect x="219" y="270" width="30" height="7" rx="3.5" fill="white"   opacity="0.65"/>

    <!-- Row 3 -->
    <rect x="30"  y="294" width="50" height="22" rx="7" fill="white"   opacity="0.82"/>
    <rect x="90"  y="294" width="50" height="22" rx="7" fill="white"   opacity="0.13"/>
    <rect x="150" y="294" width="50" height="22" rx="7" fill="#2F9E6A" opacity="0.90"/>
    <rect x="210" y="294" width="50" height="22" rx="7" fill="white"   opacity="0.13"/>
    <rect x="270" y="294" width="50" height="22" rx="7" fill="white"   opacity="0.82"/>
    <rect x="39"  y="301" width="30" height="7" rx="3.5" fill="#001F6B" opacity="0.28"/>
    <rect x="159" y="301" width="30" height="7" rx="3.5" fill="white"   opacity="0.65"/>
    <rect x="279" y="301" width="30" height="7" rx="3.5" fill="#001F6B" opacity="0.28"/>

    <!-- Row 4 — fading -->
    <rect x="56"  y="325" width="50" height="18" rx="7" fill="white" opacity="0.09"/>
    <rect x="116" y="325" width="50" height="18" rx="7" fill="white" opacity="0.12"/>
    <rect x="176" y="325" width="50" height="18" rx="7" fill="white" opacity="0.09"/>
    <rect x="236" y="325" width="50" height="18" rx="7" fill="white" opacity="0.12"/>

    <!-- Row 5 — ghost -->
    <rect x="90"  y="352" width="50" height="14" rx="6" fill="white" opacity="0.05"/>
    <rect x="150" y="352" width="50" height="14" rx="6" fill="white" opacity="0.05"/>
    <rect x="210" y="352" width="50" height="14" rx="6" fill="white" opacity="0.05"/>
  </g>

  <!-- ═══════════════════════
       TOE 1 — outer left, angled -18°
  ═══════════════════════ -->
  <ellipse cx="62" cy="148" rx="46" ry="64"
           fill="#0033A0" transform="rotate(-18 62 148)"/>
  <g clip-path="url(#c-t1)">
    <g transform="rotate(-18 62 148)">
      <rect x="30" y="98"  width="64" height="11" rx="5.5" fill="white"   opacity="0.85"/>
      <rect x="30" y="114" width="44" height="11" rx="5.5" fill="white"   opacity="0.45"/>
      <rect x="30" y="130" width="64" height="11" rx="5.5" fill="#2F9E6A" opacity="0.90"/>
      <rect x="30" y="146" width="36" height="11" rx="5.5" fill="white"   opacity="0.22"/>
      <rect x="30" y="162" width="52" height="11" rx="5.5" fill="white"   opacity="0.09"/>
    </g>
  </g>

  <!-- ═══════════════════════
       TOE 2 — centre left, straight, taller
  ═══════════════════════ -->
  <ellipse cx="148" cy="112" rx="50" ry="76" fill="#0033A0"/>
  <g clip-path="url(#c-t2)">
    <rect x="112" y="48"  width="72" height="11" rx="5.5" fill="white"   opacity="0.85"/>
    <rect x="112" y="64"  width="50" height="11" rx="5.5" fill="white"   opacity="0.45"/>
    <rect x="112" y="80"  width="72" height="11" rx="5.5" fill="#2F9E6A" opacity="0.90"/>
    <rect x="112" y="96"  width="56" height="11" rx="5.5" fill="white"   opacity="0.45"/>
    <rect x="112" y="112" width="38" height="11" rx="5.5" fill="white"   opacity="0.20"/>
    <rect x="112" y="128" width="60" height="11" rx="5.5" fill="white"   opacity="0.08"/>
  </g>

  <!-- ═══════════════════════
       TOE 3 — centre right, straight, taller
  ═══════════════════════ -->
  <ellipse cx="212" cy="112" rx="50" ry="76" fill="#0033A0"/>
  <g clip-path="url(#c-t3)">
    <rect x="176" y="48"  width="72" height="11" rx="5.5" fill="white"   opacity="0.85"/>
    <rect x="176" y="64"  width="58" height="11" rx="5.5" fill="white"   opacity="0.45"/>
    <rect x="176" y="80"  width="72" height="11" rx="5.5" fill="#2F9E6A" opacity="0.90"/>
    <rect x="176" y="96"  width="44" height="11" rx="5.5" fill="white"   opacity="0.45"/>
    <rect x="176" y="112" width="62" height="11" rx="5.5" fill="white"   opacity="0.20"/>
    <rect x="176" y="128" width="36" height="11" rx="5.5" fill="white"   opacity="0.08"/>
  </g>

  <!-- ═══════════════════════
       TOE 4 — outer right, angled +18°
  ═══════════════════════ -->
  <ellipse cx="298" cy="148" rx="46" ry="64"
           fill="#0033A0" transform="rotate(18 298 148)"/>
  <g clip-path="url(#c-t4)">
    <g transform="rotate(18 298 148)">
      <rect x="266" y="98"  width="64" height="11" rx="5.5" fill="white"   opacity="0.85"/>
      <rect x="266" y="114" width="40" height="11" rx="5.5" fill="white"   opacity="0.45"/>
      <rect x="266" y="130" width="64" height="11" rx="5.5" fill="#2F9E6A" opacity="0.90"/>
      <rect x="266" y="146" width="48" height="11" rx="5.5" fill="white"   opacity="0.22"/>
      <rect x="266" y="162" width="30" height="11" rx="5.5" fill="white"   opacity="0.09"/>
    </g>
  </g>

</svg>
